<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 140" font-family="monospace">
  <defs>
    <linearGradient id="ubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#357ABD" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="regGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6ABF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4A54A0" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="550" height="140" rx="6" fill="#FAFBFC" stroke="#E8ECF0" stroke-width="1"/>

  <!-- Title -->
  <text x="275" y="18" font-size="11" fill="#555" text-anchor="middle" font-weight="bold">VF Load/Store Block Read</text>

  <!-- UB as a long bar -->
  <rect x="30" y="30" width="490" height="30" rx="3" fill="url(#ubGrad)" stroke="#2B5F8E" stroke-width="1.5"/>

  <!-- Divider lines for UB blocks -->
  <line x1="152" y1="30" x2="152" y2="60" stroke="#2B5F8E" stroke-width="1"/>
  <line x1="275" y1="30" x2="275" y2="60" stroke="#2B5F8E" stroke-width="1"/>
  <line x1="398" y1="30" x2="398" y2="60" stroke="#2B5F8E" stroke-width="1"/>

  <!-- UB block labels -->
  <text x="91" y="49" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">t0 ~ t63</text>
  <text x="213" y="49" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">t64 ~ t127</text>
  <text x="336" y="49" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">t128 ~ t191</text>
  <text x="459" y="49" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">...</text>

  <!-- UB label inside bar -->
  <text x="275" y="25" font-size="8" fill="#357ABD" text-anchor="middle">UB (Unified Buffer)</text>

  <!-- Down arrow from one block -->
  <line x1="213" y1="60" x2="213" y2="82" stroke="#5B6ABF" stroke-width="1.5"/>
  <polygon points="210,78 213,85 216,78" fill="#5B6ABF"/>

  <!-- RegTensor box below -->
  <rect x="140" y="86" width="145" height="34" rx="4" fill="url(#regGrad)" stroke="#3B4790" stroke-width="1.5"/>
  <text x="212" y="103" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">RegTensor</text>
  <text x="212" y="115" font-size="8" fill="#C5CBEF" text-anchor="middle">Vector Forward Register</text>

  <!-- LoadAlign annotation -->
  <rect x="315" y="88" width="210" height="30" rx="3" fill="#F0F0F5" stroke="#5B6ABF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="103" font-size="9" fill="#4A54A0" text-anchor="middle">LoadAlign(reg, addr + i x vecLen)</text>

  <!-- Annotation connector line -->
  <line x1="285" y1="103" x2="312" y2="103" stroke="#5B6ABF" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="308,100 315,103 308,106" fill="#5B6ABF"/>

  <!-- Step hint -->
  <text x="275" y="136" font-size="8" fill="#999" text-anchor="middle">Load data from UB block into VF register with stride = vecLen</text>
</svg>