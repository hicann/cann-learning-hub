<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" font-family="monospace">
  <defs>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E09515" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="computeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#357ABD" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ED321" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6AB81A" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="120" rx="6" fill="#FAFBFC" stroke="#E8ECF0" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="20" font-size="11" fill="#555" text-anchor="middle" font-weight="bold">FastGelu Compute Chain: xLocal → Muls(1.702) → Neg → Exp → Add → Div → yLocal</text>

  <!-- tempQueue label above chain -->
  <rect x="15" y="32" width="62" height="16" rx="3" fill="#FFF3E0" stroke="#F5A623" stroke-width="1"/>
  <text x="46" y="44" font-size="8" fill="#E09515" text-anchor="middle">tempQueue</text>
  <text x="46" y="60" font-size="10" fill="#F5A623" text-anchor="middle">&#8595;</text>

  <!-- xLocal (input) -->
  <rect x="20" y="68" width="70" height="36" rx="4" fill="url(#inputGrad)" stroke="#C07A10" stroke-width="1"/>
  <text x="55" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">xLocal</text>
  <text x="55" y="97" font-size="8" fill="#FFE0B2" text-anchor="middle">(UB)</text>

  <!-- Arrow xLocal → Neg -->
  <text x="98" y="91" font-size="16" fill="#999" text-anchor="middle">&#8594;</text>

  <!-- Neg -->
  <rect x="115" y="68" width="100" height="36" rx="4" fill="url(#computeGrad)" stroke="#2B5F8E" stroke-width="1"/>
  <text x="165" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Neg</text>
  <text x="165" y="97" font-size="8" fill="#B8D4F0" text-anchor="middle">-x</text>

  <!-- Arrow Neg → Exp -->
  <text x="223" y="91" font-size="16" fill="#999" text-anchor="middle">&#8594;</text>

  <!-- Exp -->
  <rect x="240" y="68" width="100" height="36" rx="4" fill="url(#computeGrad)" stroke="#2B5F8E" stroke-width="1"/>
  <text x="290" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Exp</text>
  <text x="290" y="97" font-size="8" fill="#B8D4F0" text-anchor="middle">e^(-x)</text>

  <!-- Arrow Exp → Add -->
  <text x="348" y="91" font-size="16" fill="#999" text-anchor="middle">&#8594;</text>

  <!-- Add -->
  <rect x="365" y="68" width="100" height="36" rx="4" fill="url(#computeGrad)" stroke="#2B5F8E" stroke-width="1"/>
  <text x="415" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Add</text>
  <text x="415" y="97" font-size="8" fill="#B8D4F0" text-anchor="middle">1 + e^(-x)</text>

  <!-- Arrow Add → Div -->
  <text x="473" y="91" font-size="16" fill="#999" text-anchor="middle">&#8594;</text>

  <!-- Div -->
  <rect x="490" y="68" width="100" height="36" rx="4" fill="url(#computeGrad)" stroke="#2B5F8E" stroke-width="1"/>
  <text x="540" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Div</text>
  <text x="540" y="97" font-size="8" fill="#B8D4F0" text-anchor="middle">x / denom</text>

  <!-- Arrow Div → yLocal -->
  <text x="598" y="91" font-size="16" fill="#999" text-anchor="middle">&#8594;</text>

  <!-- yLocal (output) -->
  <rect x="615" y="68" width="70" height="36" rx="4" fill="url(#outputGrad)" stroke="#509A16" stroke-width="1"/>
  <text x="650" y="84" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">yLocal</text>
  <text x="650" y="97" font-size="8" fill="#D4F5B8" text-anchor="middle">(UB)</text>

  <!-- tempQueue feeder arrow from top -->
  <line x1="46" y1="48" x2="46" y2="65" stroke="#F5A623" stroke-width="1.5" marker-end="none"/>
  <polygon points="42,61 46,67 50,61" fill="#F5A623"/>
</svg>