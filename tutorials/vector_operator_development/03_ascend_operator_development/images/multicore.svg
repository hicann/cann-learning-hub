<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" font-family="monospace">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
  </defs>
  <!-- Title -->
  <text x="10" y="20" font-size="11" fill="#555">totalLength = 16384, blockDim = 8, blockLength = 2048</text>
  <!-- Core blocks -->
  <g transform="translate(10,30)">
    <rect x="0" y="0" width="84" height="36" rx="3" fill="url(#core)" stroke="#2B5F8E" stroke-width="1"/>
    <text x="42" y="15" font-size="10" fill="#fff" text-anchor="middle">Core 0</text>
    <text x="42" y="30" font-size="9" fill="#B8D4F0" text-anchor="middle">0 ~ 2047</text>

    <rect x="86" y="0" width="84" height="36" rx="3" fill="url(#core)" stroke="#2B5F8E" stroke-width="1"/>
    <text x="128" y="15" font-size="10" fill="#fff" text-anchor="middle">Core 1</text>
    <text x="128" y="30" font-size="9" fill="#B8D4F0" text-anchor="middle">2048 ~ 4095</text>

    <rect x="172" y="0" width="84" height="36" rx="3" fill="url(#core)" stroke="#2B5F8E" stroke-width="1"/>
    <text x="214" y="15" font-size="10" fill="#fff" text-anchor="middle">Core 2</text>
    <text x="214" y="30" font-size="9" fill="#B8D4F0" text-anchor="middle">4096 ~ 6143</text>

    <text x="270" y="22" font-size="14" fill="#999">...</text>

    <rect x="296" y="0" width="84" height="36" rx="3" fill="url(#core)" stroke="#2B5F8E" stroke-width="1"/>
    <text x="338" y="15" font-size="10" fill="#fff" text-anchor="middle">Core 7</text>
    <text x="338" y="30" font-size="9" fill="#B8D4F0" text-anchor="middle">14336 ~ 16383</text>
  </g>
  <!-- Bottom annotation -->
  <text x="10" y="90" font-size="10" fill="#888">blockLength (2048)</text>
  <g transform="translate(10,95)">
    <line x1="0" y1="2" x2="42" y2="2" stroke="#4A90D9" stroke-width="2"/>
    <line x1="0" y1="2" x2="0" y2="6" stroke="#4A90D9" stroke-width="1"/>
    <line x1="42" y1="2" x2="42" y2="6" stroke="#4A90D9" stroke-width="1"/>
  </g>
  <!-- Formula -->
  <text x="70" y="100" font-size="9" fill="#666">blockLength = totalLength / blockDim = 16384 / 8</text>
</svg>