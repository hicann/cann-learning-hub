<svg xmlns="http://www.w3.org/2000/svg" width="600" height="100" viewBox="0 0 600 100">
<defs>
<style>
.gm{fill:#fff8e6;stroke:#d99a00;stroke-width:1.4}
.ub{fill:#f7fbff;stroke:#337ab7;stroke-width:1.4}
.sync{fill:#fff3f3;stroke:#c74a4a;stroke-width:1.4}
.vec{fill:#f2fff4;stroke:#3a9d45;stroke-width:1.4;stroke-dasharray:4 2}
.txt{font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;fill:#1f2933;font-weight:600}
.small{font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:11px;fill:#4b5563}
.sync-lbl{font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:11px;fill:#c74a4a;font-weight:600}
.arrow{stroke:#374151;stroke-width:1.6;fill:none;marker-end:url(#arr)}
</style>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M0 0L10 5L0 10z" fill="#374151"/>
</marker>
</defs>

<rect x="0" y="0" width="600" height="100" fill="#ffffff"/>

<!-- GM -->
<rect class="gm" x="20" y="25" width="60" height="50" rx="8"/>
<text class="txt" x="50" y="53" text-anchor="middle" dominant-baseline="central">GM</text>

<!-- MTE2 箭头 + 标注 -->
<path class="arrow" d="M80 50 H190"/>
<text class="small" x="135" y="35" text-anchor="middle">MTE2</text>
<text class="small" x="135" y="45" text-anchor="middle">DataCopy</text>

<!-- UB 含 Wait MTE2_V -->
<rect class="ub" x="190" y="25" width="130" height="50" rx="8"/>
<text class="txt" x="255" y="42" text-anchor="middle" dominant-baseline="central">UB</text>
<rect class="sync" x="200" y="52" width="110" height="20" rx="4"/>
<text class="sync-lbl" x="255" y="63" text-anchor="middle" dominant-baseline="central">Wait MTE2_V</text>

<!-- V 左线（无箭头） -->
<line x1="320" y1="50" x2="370" y2="50" stroke="#374151" stroke-width="1.6"/>

<!-- Vector 扁矩形 -->
<rect class="vec" x="370" y="40" width="80" height="20" rx="8"/>
<text class="txt" x="410" y="50" text-anchor="middle" dominant-baseline="central" font-size="12">Vector</text>
<text class="small" x="410" y="27" text-anchor="middle">V</text>
<text class="small" x="410" y="37" text-anchor="middle">计算</text>

<!-- V 右箭头 -->
<path class="arrow" d="M450 50 H510"/>

<!-- 省略号 -->
<text class="txt" x="530" y="54" text-anchor="middle" dominant-baseline="central" font-size="18">···</text>

</svg>
