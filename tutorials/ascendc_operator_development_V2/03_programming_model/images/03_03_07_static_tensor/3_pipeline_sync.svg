<svg xmlns="http://www.w3.org/2000/svg" width="830" height="420" viewBox="0 0 830 420">
<defs>
<style>
.bg{fill:#ffffff}.lane{fill:#f9fafb;stroke:#e5e7eb;stroke-width:1.2;rx:12;ry:12}.box{fill:#f7fbff;stroke:#337ab7;stroke-width:1.4;rx:10;ry:10}.store{fill:#fff8e6;stroke:#d99a00;stroke-width:1.4;rx:10;ry:10}.compute{fill:#f2fff4;stroke:#3a9d45;stroke-width:1.4;rx:10;ry:10}.sync{fill:#fff3f3;stroke:#c74a4a;stroke-width:1.4;rx:10;ry:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:1.2;rx:10;ry:10}.txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#1f2933}.small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:12px;fill:#4b5563}.title{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;fill:#111827}.laneTitle{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:14px;font-weight:700;fill:#374151}.arrow{stroke:#374151;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7280;stroke-width:1.4;fill:none;stroke-dasharray:5 4;marker-end:url(#arrow)}.danger{stroke:#ea580c;stroke-width:1.4;fill:none;stroke-dasharray:4 3;marker-end:url(#arrow-orange)}
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#374151"/></marker>
<marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#ea580c"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="830" height="420"/>
<text class="title" x="28" y="34">核内并行流水与同步关系</text>
<text class="small" x="76" y="68">时间推进方向</text><path class="arrow" d="M160 64 H750"/>

<rect class="lane" x="28" y="88" width="775" height="75"/>
<text class="laneTitle" x="48" y="130">MTE2 搬入流水</text>
<rect class="box" x="190" y="104" width="105" height="45"/><text class="txt" x="208" y="125">DataCopy</text><text class="small" x="215" y="140">(GM->UB)</text>
<rect class="sync" x="300" y="104" width="120" height="45"/><text class="txt" x="330" y="125">SetFlag</text><text class="small" x="335" y="140">MTE2_V</text>

<rect class="lane" x="28" y="183" width="775" height="75"/>
<text class="laneTitle" x="48" y="225">V 计算流水</text>
<rect class="sync" x="300" y="200" width="120" height="45"/><text class="txt" x="330" y="220">WaitFlag</text><text class="small" x="335" y="235">MTE2_V</text>
<path class="dash" d="M360 148 V199"/>
<rect class="compute" x="425" y="200" width="100" height="45"/><text class="txt" x="460" y="226">Add</text>
<rect class="sync" x="530" y="200" width="120" height="45"/><text class="txt" x="560" y="220">SetFlag</text><text class="small" x="565" y="235">V_MTE3</text>

<rect class="lane" x="28" y="278" width="775" height="75"/>
<text class="laneTitle" x="48" y="320">MTE3 搬出流水</text>
<rect class="sync" x="530" y="295" width="120" height="45"/><text class="txt" x="560" y="315">WaitFlag</text><text class="small" x="565" y="330">V_MTE3</text>
<path class="dash" d="M590 243 V294"/>

<rect class="box" x="655" y="295" width="105" height="45"/><text class="txt" x="670" y="315">DataCopy</text><text class="small" x="675" y="330">(UB->GM)</text>

<path class="danger" d="M250 148 C250 200 450 140 475 200"/>
<text class="small" x="160" y="185">没有 MTE2_V：V 可能提前读取 UB</text>
<path class="danger" d="M475 243 C475 295 675 260 700 295"/>
<text class="small" x="600" y="273">没有 V_MTE3：MTE3 可能提前搬出结果</text>
<rect class="warn" x="40" y="366" width="750" height="34"/>
<text class="small" x="59" y="387">要点：AI Core 内部流水可并行发射。读写同一片 Local Memory 时，需要用 SetFlag/WaitFlag 或 PipeBarrier 显式建立指令先后关系。</text>
</svg>
