<svg xmlns="http://www.w3.org/2000/svg" width="560" height="280" viewBox="0 0 560 280" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="560" height="280" fill="#ffffff"/>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">asc_threadfence：保证内存写入顺序</text>

  <!-- ===== LEFT: without fence ===== -->
  <rect x="20" y="44" width="248" height="212" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6"/>
  <text x="144" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">不加栅栏</text>

  <rect x="60" y="82" width="168" height="30" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.3"/>
  <text x="144" y="101" text-anchor="middle" font-size="11" fill="#991b1b">写数据 data</text>

  <rect x="60" y="150" width="168" height="30" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.3"/>
  <text x="144" y="169" text-anchor="middle" font-size="11" fill="#991b1b">改标记位 flag = 1</text>

  <!-- reorder arrows (crossed) -->
  <path d="M228 97 C 252 97, 252 165, 228 165" fill="none" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#ar)"/>
  <text x="240" y="134" font-size="10" fill="#dc2626" text-anchor="middle">不保证顺序</text>

  <text x="144" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#b91c1c">flag 先就绪、data 未写完</text>
  <text x="144" y="232" text-anchor="middle" font-size="11" fill="#b91c1c">→ 其它线程读到脏数据 ✗</text>

  <!-- ===== RIGHT: with fence ===== -->
  <rect x="292" y="44" width="248" height="212" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
  <text x="416" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">加栅栏</text>

  <rect x="332" y="78" width="168" height="28" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.3"/>
  <text x="416" y="96" text-anchor="middle" font-size="11" fill="#166534">写数据 data</text>
  <line x1="416" y1="106" x2="416" y2="120" stroke="#16a34a" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="332" y="120" width="168" height="26" rx="5" fill="#16a34a"/>
  <text x="416" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">asc_threadfence()</text>
  <line x1="416" y1="146" x2="416" y2="160" stroke="#16a34a" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="332" y="160" width="168" height="28" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.3"/>
  <text x="416" y="178" text-anchor="middle" font-size="11" fill="#166534">改标记位 flag = 1</text>

  <text x="416" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">data 写入完成后才置 flag</text>
  <text x="416" y="238" text-anchor="middle" font-size="11" fill="#15803d">→ 其它线程读到有效数据 ✓</text>
</svg>
