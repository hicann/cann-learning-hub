<svg xmlns="http://www.w3.org/2000/svg" width="760" height="310" viewBox="0 0 760 310" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="310" fill="#ffffff"/>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M6,0 L0,3 L6,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f2937">三类函数的调用关系</text>

  <!-- Host side region -->
  <rect x="30" y="55" width="300" height="250" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="46" y="78" font-size="13" font-weight="bold" fill="#1d4ed8">Host 侧</text>

  <!-- Device side region -->
  <rect x="430" y="55" width="300" height="250" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="446" y="78" font-size="13" font-weight="bold" fill="#166534">Device 侧</text>

  <!-- Host function box -->
  <rect x="70" y="150" width="220" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">host 侧执行函数</text>
  <text x="180" y="196" text-anchor="middle" font-size="10" fill="#2563eb">组织数据、配置参数、发起调用</text>

  <!-- Kernel box -->
  <rect x="470" y="110" width="220" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="580" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#a16207">核函数 (__global__)</text>
  <text x="580" y="154" text-anchor="middle" font-size="10" fill="#a16207">device 侧并行计算入口</text>

  <!-- Device function box -->
  <rect x="470" y="210" width="220" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="580" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">device 侧执行函数</text>
  <text x="580" y="254" text-anchor="middle" font-size="10" fill="#15803d">(__aicore__，非核函数)</text>

  <!-- host self-call loop -->
  <path d="M 150 150 C 142 116, 188 116, 180 148" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="230" y="128" text-anchor="middle" font-size="9" fill="#2563eb">调用其它 host 函数</text>

  <!-- host -> kernel via <<<>>> -->
  <path d="M 290 165 Q 380 150 468 140" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#a1)"/>
  <text x="380" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">通过 &lt;&lt;&lt;...&gt;&gt;&gt; 调用</text>

  <!-- kernel -> device function -->
  <path d="M 580 170 L 580 208" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#a2)"/>
  <text x="592" y="192" font-size="9.5" fill="#16a34a">调用</text>

  <!-- device function self-call -->
  <path d="M 690 232 C 728 224, 728 256, 690 248" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="705" y="292" text-anchor="middle" font-size="9" fill="#16a34a">可调用同类 device 函数</text>
</svg>
