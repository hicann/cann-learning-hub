<svg xmlns="http://www.w3.org/2000/svg" width="760" height="312" viewBox="0 0 760 312" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="312" fill="#ffffff"/>

  <defs>
    <marker id="bi" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">SIMT 内存层级</text>

  <!-- ===== Grid (Device) ===== -->
  <rect x="40" y="42" width="680" height="200" rx="10" fill="#eef6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="58" y="60" font-size="12" font-weight="bold" fill="#1d4ed8">Grid</text>

  <!-- stacked blocks hint (stacking extends toward lower-left; front block at lower-left) -->
  <rect x="84" y="64" width="600" height="156" rx="9" fill="#fde9c8" stroke="#d97706" stroke-width="1.3"/>
  <rect x="76" y="72" width="600" height="156" rx="9" fill="#fef0d6" stroke="#d97706" stroke-width="1.3"/>
  <rect x="68" y="80" width="600" height="156" rx="9" fill="#fff7ec" stroke="#d97706" stroke-width="2"/>
  <text x="84" y="98" font-size="12" font-weight="bold" fill="#b45309">Thread Block (0, 0, 0)</text>

  <!-- ===== Shared Memory (TOP) ===== -->
  <rect x="78" y="108" width="580" height="32" rx="6" fill="#fde68a" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="368" y="129" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">共享内存 Shared Memory</text>

  <!-- ===== Three lanes: [Thread | 寄存器] side by side ===== -->
  <!-- register centers x = 254, 424, 594 -->

  <!-- lane 0 -->
  <rect x="110" y="174" width="84" height="38" rx="5" fill="#cffafe" stroke="#0891b2" stroke-width="1.6"/>
  <text x="152" y="197" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#155e75">Thread(0,0,0)</text>
  <rect x="212" y="178" width="64" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.6"/>
  <text x="244" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">寄存器</text>
  <line x1="194" y1="193" x2="212" y2="193" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- lane 1 -->
  <rect x="300" y="174" width="84" height="38" rx="5" fill="#cffafe" stroke="#0891b2" stroke-width="1.6"/>
  <text x="342" y="197" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#155e75">Thread(1,0,0)</text>
  <rect x="402" y="178" width="64" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.6"/>
  <text x="434" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">寄存器</text>
  <line x1="384" y1="193" x2="402" y2="193" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- lane 2 -->
  <rect x="490" y="174" width="84" height="38" rx="5" fill="#cffafe" stroke="#0891b2" stroke-width="1.6"/>
  <text x="532" y="197" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#155e75">Thread(2,0,0)</text>
  <rect x="592" y="178" width="64" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.6"/>
  <text x="624" y="197" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">寄存器</text>
  <line x1="574" y1="193" x2="592" y2="193" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- Registers <-> Shared Memory (straight up) -->
  <line x1="244" y1="178" x2="244" y2="140" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>
  <line x1="434" y1="178" x2="434" y2="140" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>
  <line x1="624" y1="178" x2="624" y2="140" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- Registers <-> Global Memory (straight down) -->
  <line x1="244" y1="208" x2="244" y2="252" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>
  <line x1="434" y1="208" x2="434" y2="252" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>
  <line x1="624" y1="208" x2="624" y2="252" stroke="#6b7280" stroke-width="1.4" marker-start="url(#bi)" marker-end="url(#bi)"/>

  <!-- ===== Global Memory (BOTTOM) ===== -->
  <rect x="40" y="252" width="680" height="50" rx="9" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="380" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">全局内存 Global Memory</text>
</svg>
