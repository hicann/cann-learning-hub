<svg xmlns="http://www.w3.org/2000/svg" width="700" height="290" viewBox="0 0 700 290" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="700" height="290" fill="#ffffff"/>

  <defs>
    <marker id="ld" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="wb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ca8a04"/>
    </marker>
    <marker id="cp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="350" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f2937">数据加载、计算与写回流程</text>

  <!-- ===== single row of units ===== -->
  <!-- 内存 -->
  <rect x="30"  y="130" width="150" height="80" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="105" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">内存</text>
  <text x="105" y="186" text-anchor="middle" font-size="10" fill="#6b7280">输入 / 输出数据</text>

  <!-- 多级缓存 -->
  <rect x="250" y="130" width="130" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="315" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">多级缓存</text>

  <!-- 寄存器 -->
  <rect x="450" y="130" width="150" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="525" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">寄存器</text>

  <!-- 计算单元 above register -->
  <rect x="455" y="60" width="140" height="44" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="525" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">⚙ 计算单元</text>
  <line x1="513" y1="104" x2="513" y2="128" stroke="#16a34a" stroke-width="2" marker-end="url(#cp)"/>
  <line x1="537" y1="128" x2="537" y2="104" stroke="#16a34a" stroke-width="2" marker-end="url(#cp)"/>

  <!-- ===== load arrows (top, blue, ->) ===== -->
  <line x1="185" y1="155" x2="245" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#ld)"/>
  <line x1="385" y1="155" x2="445" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#ld)"/>
  <text x="315" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">逐级加载 (Load)</text>

  <!-- ===== writeback arrows (bottom, yellow, <-) ===== -->
  <line x1="445" y1="190" x2="385" y2="190" stroke="#ca8a04" stroke-width="2" marker-end="url(#wb)"/>
  <line x1="245" y1="190" x2="185" y2="190" stroke="#ca8a04" stroke-width="2" marker-end="url(#wb)"/>
  <text x="315" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">逐级写回 (Write)</text>

  <!-- legend -->
  <line x1="440" y1="240" x2="470" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#ld)"/>
  <text x="478" y="244" font-size="11" fill="#374151">加载</text>
  <line x1="540" y1="240" x2="570" y2="240" stroke="#ca8a04" stroke-width="2" marker-end="url(#wb)"/>
  <text x="578" y="244" font-size="11" fill="#374151">写回</text>
</svg>
