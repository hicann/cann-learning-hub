<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="640" viewBox="0 0 1320 640">
  <defs>
    <style>
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 500 16px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .head { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .row-title { font: 700 17px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .text { font: 600 17px Arial, "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .small { font: 500 14px Arial, "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .note { font: 500 13px Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .box { stroke-width: 2; rx: 8; }
      .prep { fill: #eef7ff; stroke: #3b82f6; }
      .build { fill: #f0fdf4; stroke: #22c55e; }
      .compile { fill: #fff7ed; stroke: #f97316; }
      .runtime { fill: #f8f0ff; stroke: #a855f7; }
      .header { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .stage-label { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .arrow { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .grid { stroke: #e5e7eb; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="640" fill="#ffffff"/>

  <rect x="235" y="35" width="470" height="58" class="header"/>
  <text x="470" y="71" text-anchor="middle" class="head">cann内置算子 Add</text>

  <rect x="775" y="35" width="470" height="58" class="header"/>
  <text x="1010" y="71" text-anchor="middle" class="head">自定义算子 AddCustom</text>

  <line x1="740" y1="105" x2="740" y2="620" class="grid"/>

  <rect x="55" y="115" width="145" height="86" class="stage-label"/>
  <text x="127" y="151" text-anchor="middle" class="row-title">1. 入图准备</text>
  <text x="127" y="176" text-anchor="middle" class="note">原型 / 推导 / 实现</text>

  <rect x="235" y="115" width="470" height="86" class="box prep"/>
  <text x="470" y="147" text-anchor="middle" class="text">CANN 内置算子包已提供</text>
  <text x="470" y="173" text-anchor="middle" class="small">Add 的原型、推导规则和执行实现</text>

  <rect x="775" y="115" width="470" height="86" class="box prep"/>
  <text x="1010" y="142" text-anchor="middle" class="text">用户补齐 AddCustom 接入信息</text>
  <text x="1010" y="168" text-anchor="middle" class="small">REG_OP + ShapeInferOp / EagerExecuteOp</text>
  <text x="1010" y="189" text-anchor="middle" class="small">REG_AUTO_MAPPING_OP 建立节点到执行类映射</text>

  <path d="M470 201 L470 238" class="arrow"/>
  <path d="M1010 201 L1010 238" class="arrow"/>

  <rect x="55" y="240" width="145" height="86" class="stage-label"/>
  <text x="127" y="276" text-anchor="middle" class="row-title">2. Host 构图</text>
  <text x="127" y="301" text-anchor="middle" class="note">创建 GE 节点</text>

  <rect x="235" y="240" width="470" height="86" class="box build"/>
  <text x="470" y="272" text-anchor="middle" class="text">创建 ge::op::Add 节点</text>
  <text x="470" y="298" text-anchor="middle" class="small">set_input_x1(x).set_input_x2(y)</text>

  <rect x="775" y="240" width="470" height="86" class="box build"/>
  <text x="1010" y="272" text-anchor="middle" class="text">创建 ge::op::AddCustom 节点</text>
  <text x="1010" y="298" text-anchor="middle" class="small">set_input_x(add_builtin).set_input_y(y)</text>

  <path d="M470 326 L470 363" class="arrow"/>
  <path d="M1010 326 L1010 363" class="arrow"/>

  <rect x="55" y="365" width="145" height="98" class="stage-label"/>
  <text x="127" y="402" text-anchor="middle" class="row-title">3. GE 处理</text>
  <text x="127" y="427" text-anchor="middle" class="note">编译 / 执行准备</text>

  <rect x="235" y="365" width="470" height="98" class="box compile"/>
  <text x="470" y="398" text-anchor="middle" class="text">识别内置 Add，选择内置实现</text>
  <text x="470" y="424" text-anchor="middle" class="small">在线执行：当前进程内完成图准备和调度</text>
  <text x="470" y="446" text-anchor="middle" class="small">离线编译：执行任务进入 OM</text>

  <rect x="775" y="365" width="470" height="98" class="box compile"/>
  <text x="1010" y="398" text-anchor="middle" class="text">识别 AddCustom，调用用户推导</text>
  <text x="1010" y="424" text-anchor="middle" class="small">根据 ShapeInferOp 补齐输出 shape / dtype</text>
  <text x="1010" y="446" text-anchor="middle" class="small">运行前通过 ASCEND_CUSTOM_OPP_PATH 找到自定义库</text>

  <path d="M470 463 L470 500" class="arrow"/>
  <path d="M1010 463 L1010 500" class="arrow"/>

  <rect x="55" y="502" width="145" height="112" class="stage-label"/>
  <text x="127" y="545" text-anchor="middle" class="row-title">4. 调用执行</text>
  <text x="127" y="570" text-anchor="middle" class="note">运行到节点时</text>

  <rect x="235" y="502" width="470" height="112" class="box runtime"/>
  <text x="470" y="536" text-anchor="middle" class="text">GE / Runtime 按执行计划调度</text>
  <text x="470" y="562" text-anchor="middle" class="small">触发 CANN 内置 Add kernel 或对应任务</text>
  <text x="470" y="585" text-anchor="middle" class="note">用户代码不进入单独的 Execute() 回调</text>

  <rect x="775" y="502" width="470" height="112" class="box runtime"/>
  <text x="1010" y="534" text-anchor="middle" class="text">GE 运行到 AddCustom 节点</text>
  <text x="1010" y="560" text-anchor="middle" class="small">回调 EagerExecuteOp::Execute()</text>
  <text x="1010" y="583" text-anchor="middle" class="small">Execute() 中申请输出并用 &lt;&lt;&lt;&gt;&gt;&gt; 启动 Ascend C kernel</text>

</svg>
