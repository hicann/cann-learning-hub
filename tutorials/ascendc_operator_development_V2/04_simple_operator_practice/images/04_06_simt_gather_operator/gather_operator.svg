<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="320" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">Gather：output[i] = input[index[i]]</text>

  <!-- ===== index 数组（上） ===== -->
  <text x="60" y="74" text-anchor="end" font-size="13" font-weight="bold" fill="#a16207">index</text>
  <g font-size="13" text-anchor="middle">
    <rect x="80"  y="58" width="80" height="34" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/><text x="120" y="80" fill="#a16207">0</text>
    <rect x="160" y="58" width="80" height="34" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/><text x="200" y="80" fill="#a16207">2</text>
    <rect x="240" y="58" width="80" height="34" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/><text x="280" y="80" fill="#a16207">2</text>
    <rect x="320" y="58" width="80" height="34" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/><text x="360" y="80" fill="#a16207">4</text>
    <rect x="400" y="58" width="80" height="34" fill="#fffbeb" stroke="#ca8a04" stroke-width="1.5"/><text x="440" y="80" fill="#a16207">1</text>
  </g>
  <g font-size="9" text-anchor="middle" fill="#9ca3af">
    <text x="120" y="104">i=0</text><text x="200" y="104">i=1</text><text x="280" y="104">i=2</text><text x="360" y="104">i=3</text><text x="440" y="104">i=4</text>
  </g>

  <!-- ===== input 数组（中） ===== -->
  <text x="60" y="184" text-anchor="end" font-size="13" font-weight="bold" fill="#1d4ed8">input</text>
  <g font-size="13" text-anchor="middle">
    <rect x="80"  y="168" width="80" height="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/><text x="120" y="190" fill="#1d4ed8">10</text>
    <rect x="160" y="168" width="80" height="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/><text x="200" y="190" fill="#1d4ed8">11</text>
    <rect x="240" y="168" width="80" height="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/><text x="280" y="190" fill="#1d4ed8">12</text>
    <rect x="320" y="168" width="80" height="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/><text x="360" y="190" fill="#1d4ed8">13</text>
    <rect x="400" y="168" width="80" height="34" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/><text x="440" y="190" fill="#1d4ed8">14</text>
  </g>
  <g font-size="9" text-anchor="middle" fill="#9ca3af">
    <text x="120" y="216">[0]</text><text x="200" y="216">[1]</text><text x="280" y="216">[2]</text><text x="360" y="216">[3]</text><text x="440" y="216">[4]</text>
  </g>

  <!-- ===== output 数组（下） ===== -->
  <text x="60" y="306" text-anchor="end" font-size="13" font-weight="bold" fill="#166534">output</text>
  <g font-size="13" text-anchor="middle">
    <rect x="80"  y="290" width="80" height="34" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="120" y="312" fill="#166534">10</text>
    <rect x="160" y="290" width="80" height="34" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="200" y="312" fill="#166534">12</text>
    <rect x="240" y="290" width="80" height="34" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="280" y="312" fill="#166534">12</text>
    <rect x="320" y="290" width="80" height="34" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="360" y="312" fill="#166534">14</text>
    <rect x="400" y="290" width="80" height="34" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="440" y="312" fill="#166534">11</text>
  </g>

  <!-- ===== 采集箭头：input[index[i]] -> output[i] ===== -->
  <!-- i=0: index=0 -> input[0](x120) -> output[0](x120) -->
  <path d="M 120 202 L 120 288" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- i=1: index=2 -> input[2](x280) -> output[1](x200) -->
  <path d="M 280 202 C 280 250, 200 245, 200 288" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- i=2: index=2 -> input[2](x280) -> output[2](x280) -->
  <path d="M 290 202 C 305 245, 290 250, 282 288" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- i=3: index=4 -> input[4](x440) -> output[3](x360) -->
  <path d="M 440 202 C 440 250, 360 245, 360 288" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <!-- i=4: index=1 -> input[1](x200) -> output[4](x440) -->
  <path d="M 200 202 C 200 245, 440 250, 440 288" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="320" y="348" text-anchor="middle" font-size="11" fill="#15803d">每个 output[i] 用 index[i] 作下标，从 input 中采集对应元素（下标可跳跃、可重复）</text>
</svg>
