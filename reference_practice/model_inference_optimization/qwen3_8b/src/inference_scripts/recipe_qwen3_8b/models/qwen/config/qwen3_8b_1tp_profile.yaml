model_config:
  model_name: "qwen3_8b"
  model_path: "Qwen/Qwen3-8B"
  dtype: "bfloat16"
  exe_mode: "eager"        # ["ge_graph", "eager", "npugraph_ex"]
  enable_profiler: True  # [False, True]
  with_ckpt: True # [False, True]
  enable_cache_compile: False # [False, True]
  enable_static_kernel: False # [False, True] only for npugraph_ex
  custom_params:
    enable_npu_rmsnorm: False
    enable_add_rmsnorm: False

data_config:
  dataset: "default"  # ["default", "LongBench"]
  input_truncated_len: 256

parallel_config:
  world_size: 1
  attn_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 1

scheduler_config:
  max_new_tokens: 64
  batch_size: 1
  enable_thinking: False
